# Database connection settings
#spring.datasource.url=jdbc:mysql://localhost:3306/questiondb
#spring.datasource.username=telusko_ms
#spring.datasource.password=telusko_ms!
#
## Specify the DBMS
#spring.jpa.database = MYSQL
#
# Show or not log for each sql query
spring.jpa.show-sql = true
#
## Hibernate ddl auto (create, create-drop, update)
#spring.jpa.hibernate.ddl-auto = update
#
## Use spring.jpa.properties.* for Hibernate native properties (the prefix is
## stripped before adding them to the entity manager)
#spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect

spring.datasource.url=jdbc:h2:mem:questiondb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Force Hibernate to recreate tables on boot so data.sql has a target
spring.jpa.hibernate.ddl-auto=create-drop

# Tell Spring Boot to always execute data.sql on startup
spring.sql.init.mode=always

# Defer data initialization until after Hibernate/JPA creates the tables
spring.jpa.defer-datasource-initialization=true
spring.h2.console.settings.web-allow-others=true
