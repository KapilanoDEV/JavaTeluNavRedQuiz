name: CI/CD Pipeline - Build and Deploy to VM

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'corretto'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean build -x test

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/quizapp:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/quizapp:${{ github.sha }}

  deploy:
    runs-on: self-hosted 
    needs: build-and-push
    steps:
    - name: SSH and Deploy via Native Terminal
      run: |
        ssh -o StrictHostKeyChecking=no amit@192.168.237.133 << 'EOF'
          # Log into Docker Hub securely inside the VM
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Pull down the freshly built image
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/quizapp:latest
          
          # Clean up old instances if they are running
          docker stop quizapp-container || true
          docker rm quizapp-container || true
          
          # Spin up the new service on port 8080
          docker run -d \
            --name quizapp-container \
            -p 8080:8080 \
            --restart always \
            ${{ secrets.DOCKERHUB_USERNAME }}/quizapp:latest
        EOF
